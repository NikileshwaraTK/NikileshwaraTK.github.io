<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikileshwara | Data Engineer</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .nav-btn {
            transition: 0.2s ease;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            background: #2563eb;
            color: white;
        }

        .active {
            background: #2563eb;
            color: white;
        }

        #loader {
            display: none;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="fixed top-5 left-1/2 -translate-x-1/2 bg-white shadow-lg rounded-xl px-4 py-2 flex gap-3 z-50">

    <button onclick="navigate('home')" class="nav-btn px-4 py-2 rounded-lg">Home</button>
    <button onclick="navigate('experience')" class="nav-btn px-4 py-2 rounded-lg">Experience</button>
    <button onclick="navigate('projects')" class="nav-btn px-4 py-2 rounded-lg">Projects</button>
    <button onclick="navigate('education')" class="nav-btn px-4 py-2 rounded-lg">Education</button>
    <button onclick="navigate('certifications')" class="nav-btn px-4 py-2 rounded-lg">Certifications</button>

</div>

<!-- LOADER -->
<div id="loader" class="fixed inset-0 flex items-center justify-center bg-white z-40">
    <div class="text-blue-600 text-xl font-semibold">Loading...</div>
</div>

<!-- MAIN CONTENT -->
<div id="app"></div>

<!-- SCRIPT -->
<script>
const routes = {
    home: "home.html",   // we will create this
    experience: "experience.html",
    projects: "projects.html",
    education: "education.html",
    certifications: "certifications.html"
};

async function loadPage(page) {
    try {
        document.getElementById("loader").style.display = "flex";

        const response = await fetch(routes[page]);
        const html = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        document.getElementById("app").innerHTML = doc.body.innerHTML;

        window.scrollTo(0, 0);

        document.getElementById("loader").style.display = "none";

        setActive(page);

    } catch (err) {
        console.error(err);
    }
}

function navigate(page) {
    history.pushState({ page }, "", "#" + page);
    loadPage(page);
}

window.onpopstate = function (event) {
    const page = event.state?.page || "home";
    loadPage(page);
};

function setActive(page) {
    document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));

    const map = {
        home: 0,
        experience: 1,
        projects: 2,
        education: 3,
        certifications: 4
    };

    document.querySelectorAll(".nav-btn")[map[page]].classList.add("active");
}

window.addEventListener("DOMContentLoaded", () => {
    const page = location.hash.replace("#", "") || "home";
    loadPage(page);
});
</script>

</body>
</html>
