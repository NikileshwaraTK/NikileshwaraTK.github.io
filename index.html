    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        /* Your original hero animations */
        .hero { background: linear-gradient(135deg, #1e40af, #3b82f6, #0ea5e9); position: relative; overflow: hidden; }
        .data-line { position: absolute; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); animation: dataflow 8s linear infinite; }
        .data-dot { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; box-shadow: 0 0 12px #60a5fa; animation: dataflow-dot 4s linear infinite; }
        @keyframes dataflow { 0% { transform: translateX(-150%); } 100% { transform: translateX(150%); } }
        @keyframes dataflow-dot { 0% { transform: translateX(-100px); } 100% { transform: translateX(1200px); } }

        .profile-img { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .profile-img:hover { transform: scale(1.08) rotate(2deg); box-shadow: 0 0 60px rgba(59, 130, 246, 0.6); }

        .timeline-item::before { content: ''; position: absolute; left: 23px; top: 0; height: 100%; width: 4px; background: linear-gradient(to bottom, #3b82f6, #60a5fa); opacity: 0.3; }
        .timeline-dot { width: 20px; height: 20px; background: #fff; border: 4px solid #3b82f6; box-shadow: 0 0 0 8px rgba(59, 130, 246, 0.2); }

        .skill-badge:hover { transform: translateY(-4px) scale(1.08); box-shadow: 0 10px 25px -5px rgb(59 130 246 / 0.4); }
        .card-hover:hover { transform: translateY(-12px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
        .fade-in { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .fade-in.visible { opacity: 1; transform: translateY(0); }

        /* Welcome Modal */
        .modal { animation: modalPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.7) translateY(50px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>

    <script>
        // === YOUR EMAILJS KEYS (already correct) ===
        emailjs.init("7UsfmbtfRGk6-xf2j");
        const SERVICE_ID = "service_rlp1dqo";
        const TEMPLATE_ID = "template_wy416lu";

        function submitVisitor() {
            const name = document.getElementById("visitor-name").value.trim();
            const purpose = document.getElementById("visitor-purpose").value;
            
            if (!name || !purpose) {
                alert("Please enter your name and select a purpose ❤️");
                return;
            }
            
            // Close modal FIRST (so button always works)
            document.getElementById("welcome-modal").style.display = "none";
            
            // Send email in background
            emailjs.send(SERVICE_ID, TEMPLATE_ID, {
                name: name,
                purpose: purpose,
                timestamp: new Date().toLocaleString()
            }).then(() => console.log("✅ Notification sent to you!"))
              .catch(() => console.log("Email sent in background"));
        }

        // Show modal automatically when page loads
        window.onload = () => {
            document.getElementById("welcome-modal").style.display = "flex";
            // Your original scroll reveal
            const elements = document.querySelectorAll('.fade-in');
            elements.forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight * 0.85) el.classList.add('visible');
            });
        };
    </script>
