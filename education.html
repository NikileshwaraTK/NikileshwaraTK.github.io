<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education | Nikileshwara T K</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
        }

        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .card-hover {
            transition: 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .fade-in {
            opacity: 0;
            transform: translateY(20px);
            transition: 0.6s ease;
        }

        .fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="bg-blue-700 text-white py-16 text-center">
        <h1 class="text-5xl title-font font-semibold">Education</h1>
        <p class="mt-4 text-lg opacity-90">Academic foundation behind my data engineering journey</p>
    </header>

    <!-- CONTENT -->
    <section class="max-w-4xl mx-auto px-6 py-16">

        <div class="bg-white rounded-3xl p-10 shadow-xl card-hover fade-in">

            <div class="flex items-start gap-6">
                <div class="text-blue-600 text-4xl">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>

                <div>
                    <h2 class="text-2xl font-semibold mb-2">
                        Bachelor of Technology (B.Tech)
                    </h2>

                    <p class="text-lg text-slate-700 font-medium">
                        Computer Science Engineering
                    </p>

                    <p class="text-slate-600 mt-2">
                        Visvesvaraya Technological University (VTU)
                    </p>

                    <p class="text-sm text-slate-500 mt-2">
                        Graduated: 2018
                    </p>
                </div>
            </div>

        </div>

        <!-- EXTRA SPACE FOR FUTURE -->
        <div class="mt-12 text-center text-slate-400 text-sm">
            More academic details and achievements will be added here
        </div>

    </section>

    <!-- NAVIGATION -->
    <div class="text-center pb-12">
        <a href="index.html"
           class="inline-flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Portfolio
        </a>
    </div>

    <script>
        function handleScroll() {
            const elements = document.querySelectorAll('.fade-in');
            elements.forEach(el => {
                const rect = el.getBoundingClientRect();
                if (rect.top < window.innerHeight * 0.85) {
                    el.classList.add('visible');
                }
            });
        }

        window.addEventListener('scroll', handleScroll);
        window.addEventListener('load', handleScroll);
    </script>

</body>
</html>
